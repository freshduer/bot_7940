name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/bot_7940
            git pull
            docker build -t nanobot .
            docker stop nanobot-gateway || true
            docker rm nanobot-gateway || true
            docker run -d \
              --name nanobot-gateway \
              --restart unless-stopped \
              -v ~/.nanobot:/home/nanobot/.nanobot \
              nanobot gateway